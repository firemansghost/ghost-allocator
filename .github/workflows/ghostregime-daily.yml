name: GhostRegime Daily Refresh

on:
  schedule:
    - cron: "30 3 * * 1-5"  # 3:30 AM UTC, Monday-Friday (after US market close)
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Force recompute and persist even if snapshot is fresh"
        required: false
        default: false
        type: boolean
  # NOTE: No push/pull_request triggers - this workflow should only run on schedule or manual dispatch

permissions:
  contents: read

concurrency:
  group: ghostregime-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      # Intentionally on actions/checkout@v5 (Node 24 runtime per upstream; avoids legacy Node 20 warnings from older majors).
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: "Guard - seed file and secrets"
        id: guard
        shell: bash
        env:
          GHOSTREGIME_CRON_SECRET: ${{ secrets.GHOSTREGIME_CRON_SECRET }}
        run: |
          SEED="data/ghostregime/seed/ghostregime_replay_history.csv"
          SKIP="false"

          if [ ! -f "$SEED" ]; then
            echo "::warning::Seed file missing ($SEED); skipping daily job."
            SKIP="true"
          elif [ ! -s "$SEED" ]; then
            echo "::warning::Seed file empty ($SEED); skipping daily job."
            SKIP="true"
          fi

          if [ -z "${GHOSTREGIME_CRON_SECRET:-}" ]; then
            echo "::warning::GHOSTREGIME_CRON_SECRET not set; skipping daily job."
            SKIP="true"
          fi

          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"

      - name: Scheduled refresh GhostRegime (persist latest when needed)
        id: refresh
        if: steps.guard.outputs.skip != 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUTS_FORCE_REFRESH: ${{ inputs.force_refresh }}
          EVENT_INPUTS_FORCE_REFRESH: ${{ github.event.inputs.force_refresh }}
          CRON_SECRET: ${{ secrets.GHOSTREGIME_CRON_SECRET }}
        run: |
          set -euo pipefail
          REQUEST_QUERY="refresh=scheduled"
          REQUEST_MODE="scheduled"
          FORCE_REFRESH_RAW="${INPUTS_FORCE_REFRESH:-${EVENT_INPUTS_FORCE_REFRESH:-}}"

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            case "$(printf '%s' "${FORCE_REFRESH_RAW}" | tr '[:upper:]' '[:lower:]')" in
              true|1|yes|on)
                REQUEST_QUERY="force=1"
                REQUEST_MODE="manual_force"
                ;;
            esac
          fi

          URL="https://ghost-allocator.vercel.app/api/ghostregime/today?${REQUEST_QUERY}"

          {
            echo "### Request routing (debug)"
            echo "- **event_name**: \`${EVENT_NAME}\`"
            echo "- **force_refresh input (inputs)**: \`${INPUTS_FORCE_REFRESH:-_(unset)_}\`"
            echo "- **force_refresh input (github.event.inputs)**: \`${EVENT_INPUTS_FORCE_REFRESH:-_(unset)_}\`"
            echo "- **request mode**: \`${REQUEST_MODE}\`"
            echo "- **request query**: \`${REQUEST_QUERY}\`"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "Request routing: event=${EVENT_NAME} inputs.force_refresh=${INPUTS_FORCE_REFRESH:-} github.event.inputs.force_refresh=${EVENT_INPUTS_FORCE_REFRESH:-} mode=${REQUEST_MODE} query=${REQUEST_QUERY}"

          RESP="$(curl -sS --fail --retry 3 --retry-delay 5 -H "x-ghostregime-cron: ${CRON_SECRET}" "${URL}&cb=$(date +%s)")"
          echo "$RESP" > /tmp/refresh_response.json

          python3 - <<'PY'
          import json
          import sys
          import os

          SERVE_META_KEYS = [
              ("refresh_attempt", "refresh_attempt"),
              ("refresh_outcome", "refresh_outcome"),
              ("persisted_snapshot_preserved", "persisted_snapshot_preserved"),
              ("persist_rejected_reason", "persist_rejected_reason"),
              ("latest_snapshot_date", "latest_snapshot_date"),
              ("market_snapshot_lag_days", "market_snapshot_lag_days"),
              ("run_date_utc", "run_date_utc"),
              ("stale_reason", "stale_reason"),
              ("refresh_error_summary", "refresh_error_summary"),
          ]

          def has_meaningful_value(val):
              """Skip None, '', and whitespace-only strings; keep False, 0, and other non-string scalars."""
              if val is None:
                  return False
              if isinstance(val, bool):
                  return True
              if isinstance(val, (int, float)):
                  return True
              if isinstance(val, str):
                  return len(val.strip()) > 0
              return True

          def format_serve_metadata_lines(sm):
              """Lines for GitHub summary; omit absent keys and blank/whitespace values."""
              if sm is None:
                  return ["- _serve_metadata_: _(not present — API omitted or older deploy)_"]
              lines = []
              for json_key, label in SERVE_META_KEYS:
                  if json_key not in sm:
                      continue
                  val = sm.get(json_key)
                  if not has_meaningful_value(val):
                      continue
                  lines.append(f"- **{label}**: `{val}`")
              return lines

          CORE_ETF_SYMBOLS = ["SPY", "GLD", "HYG", "IEF", "EEM", "TIP", "TLT", "UUP"]

          def provider_label_from_resolved_id(resolved_id):
              rid = resolved_id or ""
              if rid.startswith("yahoo:"):
                  return "Yahoo"
              if rid.startswith("marketstack:"):
                  return "Marketstack"
              return "Stooq"

          def extract_etf_provider_routing(data):
              """Prefer serve_metadata.etf_provider_routing; fall back to provider_diagnostics."""
              sm = data.get("serve_metadata") or {}
              routing = sm.get("etf_provider_routing")
              if routing:
                  return routing
              pd = data.get("provider_diagnostics") or {}
              resolved = pd.get("resolvedIds") or {}
              feed = pd.get("feed_routing") or {}
              stooq_probe = pd.get("stooq_probe") or {}
              if not resolved and not feed and not stooq_probe:
                  return None
              symbols = []
              for sym in CORE_ETF_SYMBOLS:
                  rid = resolved.get(sym, "")
                  symbols.append({
                      "symbol": sym,
                      "provider": provider_label_from_resolved_id(rid),
                      "resolved_id": rid or None,
                      "routing": feed.get(sym),
                  })
              return {
                  "symbols": symbols,
                  "marketstack_used": any(s["provider"] == "Marketstack" for s in symbols),
                  "yahoo_etf_fallback_used": any(s["provider"] == "Yahoo" for s in symbols),
                  "stooq_browser_challenge_detected": any(
                      (p or {}).get("outcome") == "stooq_browser_challenge"
                      for p in stooq_probe.values()
                  ),
              }

          def append_provider_routing_summary(summary_lines, data):
              sm = data.get("serve_metadata") or {}
              outcome = sm.get("refresh_outcome")
              if outcome == "scheduled_served_persisted_no_fetch":
                  summary_lines.append("")
                  summary_lines.append("## Provider routing")
                  summary_lines.append("")
                  summary_lines.append("_No market fetch this run (fresh persisted snapshot). Provider routing was not refreshed._")
                  return

              routing = extract_etf_provider_routing(data)
              if not routing:
                  summary_lines.append("")
                  summary_lines.append("## Provider routing")
                  summary_lines.append("")
                  summary_lines.append("_Provider routing not available in API response (older deploy or no market fetch diagnostics)._")
                  return

              summary_lines.append("")
              summary_lines.append("## Provider routing")
              summary_lines.append("")
              summary_lines.append("| Symbol | Provider | Routing |")
              summary_lines.append("| ------ | -------- | ------- |")
              for row in routing.get("symbols", []):
                  sym = row.get("symbol", "")
                  provider = row.get("provider", "")
                  route = (row.get("routing") or "—").replace("|", "\\|")
                  summary_lines.append(f"| {sym} | {provider} | {route} |")
              summary_lines.append("")
              summary_lines.append(f"- **Marketstack used**: `{'yes' if routing.get('marketstack_used') else 'no'}`")
              summary_lines.append(f"- **Yahoo ETF fallback used**: `{'yes' if routing.get('yahoo_etf_fallback_used') else 'no'}`")
              summary_lines.append(f"- **Stooq browser challenge detected**: `{'yes' if routing.get('stooq_browser_challenge_detected') else 'no'}`")

              if routing.get("marketstack_used"):
                  ms_syms = [r["symbol"] for r in routing.get("symbols", []) if r.get("provider") == "Marketstack"]
                  summary_lines.append("")
                  summary_lines.append(f"⚠️ **Marketstack fallback was used for**: {', '.join(ms_syms)}")
              elif routing.get("yahoo_etf_fallback_used") and routing.get("stooq_browser_challenge_detected"):
                  summary_lines.append("")
                  summary_lines.append("✅ **Yahoo ETF fallback handled Stooq failure; Marketstack was not used.**")
              elif routing.get("yahoo_etf_fallback_used"):
                  summary_lines.append("")
                  summary_lines.append("✅ **Yahoo ETF fallback was used; Marketstack was not used.**")

          def print_failure_diagnostics(data, label):
              """Stdout + step summary: full JSON and structured stale/history fields."""
              print(f"--- {label}: full response JSON ---")
              print(json.dumps(data, indent=2, default=str))
              stale_detail = data.get("stale_detail")
              if stale_detail:
                  print("--- stale_detail ---")
                  print(stale_detail)
              hr = data.get("history_requirements")
              if hr:
                  print("--- history_requirements ---")
                  print(json.dumps(hr, indent=2))
              m = data.get("market_asof_date")
              fw = data.get("fetch_window")
              if m is not None or fw:
                  print("--- timing ---")
                  print(f"market_asof_date: {m}")
                  print(f"fetch_window: {fw}")
              pd = data.get("provider_diagnostics")
              if pd:
                  print("--- provider_diagnostics ---")
                  print(json.dumps(pd, indent=2, default=str))
              sm = data.get("serve_metadata")
              if sm:
                  print("--- serve_metadata ---")
                  print(json.dumps(sm, indent=2, default=str))
              miss = data.get("missing_core_symbols")
              if miss:
                  print("--- missing_core_symbols ---")
                  print(", ".join(miss))
              css = data.get("core_symbol_status")
              if css:
                  print("--- core_symbol_status (failed rows) ---")
                  for sym, st in sorted(css.items()):
                      if isinstance(st, dict) and not st.get("ok", True):
                          print(f"  {sym}: {json.dumps(st, default=str)}")
              summary_lines_extra = []
              if stale_detail:
                  summary_lines_extra.append(f"**Detail**: {stale_detail}")
              if hr:
                  summary_lines_extra.append(f"**History requirements**: `{json.dumps(hr)}`")
              if fw:
                  summary_lines_extra.append(f"**Fetch window**: `{json.dumps(fw)}`")
              return summary_lines_extra
          
          with open('/tmp/refresh_response.json', 'r') as f:
              data = json.load(f)

          summary_lines = []
          summary_lines.append("## GhostRegime Daily Refresh")
          summary_lines.append("")
          
          if "error" in data:
              error_msg = f"❌ API error: {data['error']} - {data.get('message','')}"
              print(error_msg)
              summary_lines.append(f"### ❌ Failed: {data['error']}")
              summary_lines.append(f"**Message**: {data.get('message','')}")
              summary_lines.extend(print_failure_diagnostics(data, "error response"))
              
              # Include diagnostics if present
              if "missing_core_symbols" in data:
                  summary_lines.append(f"**Missing symbols**: {', '.join(data['missing_core_symbols'])}")
              if "core_symbol_status" in data:
                  failed_symbols = [s for s, status in data['core_symbol_status'].items() if not status.get('ok', False)]
                  if failed_symbols:
                      summary_lines.append(f"**Failed symbols**: {', '.join(failed_symbols)}")
              append_provider_routing_summary(summary_lines, data)
              
              with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
                  f.write('\n'.join(summary_lines))
              sys.exit(1)

          if data.get("stale") is True:
              stale_reason = data.get('stale_reason','(no reason)')
              error_msg = f"❌ Stale=true: {stale_reason}"
              print(error_msg)
              print("--- Note: HTTP 200 with stale=true means last-known-good snapshot was served; Vercel Blob latest was NOT overwritten. ---")
              summary_lines.append(f"### ❌ Stale Data (refresh did not persist a new latest)")
              summary_lines.append(f"**Reason**: {stale_reason}")
              summary_lines.append(f"**Blob latest**: preserved (not replaced on failed refresh)")
              summary_lines.extend(print_failure_diagnostics(data, "stale response"))
              
              if "missing_core_symbols" in data:
                  summary_lines.append(f"**Missing symbols**: {', '.join(data['missing_core_symbols'])}")
              if "core_symbol_status" in data:
                  failed_symbols = [s for s, status in data['core_symbol_status'].items() if not status.get('ok', False)]
                  if failed_symbols:
                      summary_lines.append(f"**Failed symbols**: {', '.join(failed_symbols)}")
              append_provider_routing_summary(summary_lines, data)
              
              with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
                  f.write('\n'.join(summary_lines))
              sys.exit(1)

          # Manual force=1 must persist; scheduled recompute must persist when it ran a full compute
          sm_check = data.get("serve_metadata") or {}
          refresh_attempt = sm_check.get("refresh_attempt")
          refresh_outcome = sm_check.get("refresh_outcome")
          if refresh_attempt == "force" and refresh_outcome != "computed_and_persisted":
              err = f"::error::Force refresh did not persist blob latest (refresh_outcome={refresh_outcome})"
              print(err)
              if sm_check.get("persist_rejected_reason"):
                  print(f"persist_rejected_reason: {sm_check.get('persist_rejected_reason')}")
              print(json.dumps(sm_check, indent=2, default=str))
              summary_lines.append("### ❌ Force refresh: compute ran but blob latest was NOT updated")
              summary_lines.append(f"**refresh_outcome**: `{refresh_outcome}`")
              if sm_check.get("persist_rejected_reason"):
                  summary_lines.append(f"**persist_rejected_reason**: `{sm_check.get('persist_rejected_reason')}`")
              summary_lines.append("**Hint**: See Vercel logs for `[GhostRegime] Persist skipped` — often persist gate or append/history failure.")
              with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
                  f.write('\n'.join(summary_lines))
              sys.exit(1)

          scheduled_ok_outcomes = (
              "scheduled_served_persisted_no_fetch",
              "scheduled_recomputed_and_persisted",
              "computed_and_persisted",
          )
          if refresh_attempt == "scheduled" and refresh_outcome not in scheduled_ok_outcomes:
              err = f"::error::Scheduled refresh failed (refresh_outcome={refresh_outcome})"
              print(err)
              print(json.dumps(sm_check, indent=2, default=str))
              summary_lines.append("### ❌ Scheduled refresh: unexpected outcome")
              summary_lines.append(f"**refresh_outcome**: `{refresh_outcome}`")
              with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
                  f.write('\n'.join(summary_lines))
              sys.exit(1)

          success_msg = f"✅ OK - Date: {data.get('date')}, Regime: {data.get('regime')}, Source: {data.get('data_source')}"
          print(success_msg)
          sm_ok = data.get("serve_metadata")
          if sm_ok:
              print("--- serve_metadata (success, raw JSON) ---")
              print(json.dumps(sm_ok, indent=2, default=str))
          summary_lines.append("### ✅ Success")
          summary_lines.append(f"- **Row date**: `{data.get('date')}`")
          summary_lines.append(f"- **Regime**: `{data.get('regime')}`")
          summary_lines.append(f"- **data_source**: `{data.get('data_source')}`")
          sm_lines = format_serve_metadata_lines(sm_ok)
          if sm_lines:
              summary_lines.append("")
              summary_lines.append("#### Serve metadata")
              summary_lines.extend(sm_lines)
          summary_lines.append("")
          summary_lines.append(f"- **risk_score**: `{data.get('risk_score', 'N/A')}`")
          summary_lines.append(f"- **infl_score**: `{data.get('infl_score', 'N/A')}`")
          append_provider_routing_summary(summary_lines, data)
          
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write('\n'.join(summary_lines))
          PY

      - name: Check GhostRegime health
        id: health
        if: steps.guard.outputs.skip != 'true'
        env:
          HEALTH_URL: https://ghost-allocator.vercel.app/api/ghostregime/health
        run: |
          set -euo pipefail
          HEALTH_RESP="$(curl -sS --fail --retry 2 --retry-delay 3 "${HEALTH_URL}?cb=$(date +%s)")"
          echo "$HEALTH_RESP" > /tmp/health_response.json

          python3 - <<'PY'
          import json
          import sys
          import os
          
          with open('/tmp/health_response.json', 'r') as f:
              health = json.load(f)

          summary_lines = []
          summary_lines.append("## Health Check")
          summary_lines.append("")

          if not health.get("ok"):
              error_msg = f"❌ Health check failed: {health.get('status')} - {health.get('message','')}"
              print(error_msg)
              summary_lines.append(f"### ❌ {health.get('status')}")
              summary_lines.append(f"**Message**: {health.get('message','')}")
              
              with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
                  f.write('\n'.join(summary_lines))
              sys.exit(1)

          freshness = health.get("freshness", {})
          warnings = health.get("warnings", [])
          
          if health.get("status") == "OK":
              msg = f"✅ Health OK - Latest: {freshness.get('latest_date')}, Age: {freshness.get('age_days')} days"
              print(msg)
              summary_lines.append("### ✅ Health OK")
              summary_lines.append(f"**Latest Date**: {freshness.get('latest_date')}")
              summary_lines.append(f"**Age**: {freshness.get('age_days')} days")
          else:
              msg = f"⚠️  Health WARN - Latest: {freshness.get('latest_date')}, Age: {freshness.get('age_days')} days (max: {freshness.get('max_age_days')}), Status: {health.get('status')}"
              print(msg)
              summary_lines.append("### ⚠️ Health WARN")
              summary_lines.append(f"**Latest Date**: {freshness.get('latest_date')}")
              summary_lines.append(f"**Age**: {freshness.get('age_days')} days (max: {freshness.get('max_age_days')})")
              if warnings:
                  summary_lines.append("**Warnings**:")
                  for warning in warnings:
                      print(f"   ⚠️  {warning}")
                      summary_lines.append(f"- {warning}")
              # Don't fail on WARN (weekends/holidays are expected)
          
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write('\n'.join(summary_lines))
          PY

      - name: Notify Slack on failure
        if: failure() && steps.guard.outputs.skip != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          
          # Exit cleanly if webhook URL is not configured
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::notice::SLACK_WEBHOOK_URL not set; skipping Slack notification."
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          
          webhook_url = os.environ.get('SLACK_WEBHOOK_URL')
          if not webhook_url:
              exit(0)
          
          # Read responses if available
          refresh_data = {}
          health_data = {}
          
          try:
              with open('/tmp/refresh_response.json', 'r') as f:
                  refresh_data = json.load(f)
          except:
              pass
          
          try:
              with open('/tmp/health_response.json', 'r') as f:
                  health_data = json.load(f)
          except:
              pass
          
          # Build message
          message = {
              "text": "🚨 GhostRegime Daily Refresh Failed",
              "blocks": [
                  {
                      "type": "header",
                      "text": {
                          "type": "plain_text",
                          "text": "🚨 GhostRegime Daily Refresh Failed"
                      }
                  }
              ]
          }
          
          if refresh_data.get("error"):
              message["blocks"].append({
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": f"*Error*: {refresh_data.get('error')}\n*Message*: {refresh_data.get('message', 'N/A')}"
                  }
              })
              if refresh_data.get("missing_core_symbols"):
                  message["blocks"].append({
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"*Missing Symbols*: {', '.join(refresh_data['missing_core_symbols'])}"
                      }
                  })
          elif refresh_data.get("stale"):
              stale_reason = refresh_data.get("stale_reason", "N/A")
              detail = (refresh_data.get("stale_detail") or "")[:2800]
              miss = refresh_data.get("missing_core_symbols") or []
              miss_txt = ", ".join(miss) if miss else ""
              text = f"*Stale Data*\n*Reason*: {stale_reason}"
              if detail:
                  text += f"\n*Detail*: {detail}"
              if miss_txt:
                  text += f"\n*Missing / failing symbols*: {miss_txt}"
              message["blocks"].append({
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": text
                  }
              })
          
          if health_data.get("status") == "NOT_READY":
              message["blocks"].append({
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": f"*Health Status*: {health_data.get('status')}\n*Message*: {health_data.get('message', 'N/A')}"
                  }
              })
          
          message["blocks"].append({
              "type": "section",
              "text": {
                  "type": "mrkdwn",
                  "text": f"<https://github.com/firemansghost/ghost-allocator/actions|View Workflow>"
              }
          })
          
          req = urllib.request.Request(
              webhook_url,
              data=json.dumps(message).encode('utf-8'),
              headers={'Content-Type': 'application/json'}
          )
          urllib.request.urlopen(req)
          PY

